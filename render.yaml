services:
  - type: web
    name: legiacar-xiaozhi-server
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: GEMINI_API_KEY
        sync: false
